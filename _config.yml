# Profile Blog - Jekyll Configuration
name: Ethan Goh
description: Professional portfolio and blog sharing insights on technology and development
url: https://ethantrainshard.github.io/profile-blog-site/
baseurl: /profile-blog-site
avatar: /assets/images/profile_current.jpeg
email: info@cyberitdad.xyz
github: ethantrainshard
linkedin: ethan-goh-9b6615a7

# Build settings
permalink: /:categories/:year/:month/:day/:title:output_ext
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Exclude from processing
exclude:
  - README.md
  - .gitignore
  - node_modules