---
layout: default
title: Projects
---

<section class="projects-section">
  <h1 class="section-title">Projects</h1>

  <div class="projects-filter">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="web">Web Apps</button>
    <button class="filter-btn" data-filter="mobile">Mobile</button>
    <button class="filter-btn" data-filter="api">APIs</button>
  </div>

  <div class="projects-grid">
    {% for post in site.posts %}
      <article class="project-card" data-category="{{ post.category }}">
        <div class="project-header">
          <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
          <span class="project-category">{{ post.category }}</span>
        </div>
        <p class="project-description">{{ post.excerpt }}</p>
        <div class="project-tech">
          {% for tag in post.tags %}
            <span class="tech-tag">{{ tag }}</span>
          {% endfor %}
        </div>
        <div class="project-links">
          <a href="{{ post.demo_url }}" target="_blank" rel="noopener">Demo</a>
          <a href="{{ post.github_url }}" target="_blank" rel="noopener">Code</a>
        </div>
      </article>
    {% endfor %}
  </div>
</section>
