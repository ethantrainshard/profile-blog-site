---
layout: default
title: Contact
---

<section class="contact-section">
  <h1 class="section-title">Get In Touch</h1>

  <div class="contact-content">
    <p class="contact-intro">
      Interested in working together? Have a question or suggestion? I'd love to hear from you.
      Fill out the form below or reach out through my social links in the footer.
    </p>

    <form class="contact-form" onsubmit="handleContactSubmit(event)">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          placeholder="Your name"
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="your@email.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          required
          placeholder="Your message here..."
          rows="8"
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-submit">
        Send Message
      </button>

      <div class="form-message" id="formMessage"></div>
    </form>

    <div class="contact-methods">
      <h2>Or Reach Out Directly</h2>

      <div class="contact-methods-grid">
        <a href="mailto:{{ site.email }}" class="contact-method">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <span>Email</span>
        </a>

        <a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener" class="contact-method">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
          </svg>
          <span>GitHub</span>
        </a>

        <a href="https://linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noopener" class="contact-method">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
            <rect x="2" y="9" width="4" height="12"></rect>
            <circle cx="4" cy="4" r="2"></circle>
          </svg>
          <span>LinkedIn</span>
        </a>
      </div>
    </div>
  </div>
</section>

<script>
function handleContactSubmit(event) {
  event.preventDefault();

  const form = event.target;
  const formData = new FormData(form);
  const formMessage = document.getElementById('formMessage');

  // Validate email format
  const email = formData.get('email');
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(email)) {
    formMessage.textContent = 'Please enter a valid email address.';
    formMessage.classList.add('error');
    return;
  }

  // Simulate form submission (replace with actual form handling)
  formMessage.textContent = 'Message sent successfully!';
  formMessage.classList.add('success');
  form.reset();

  // Hide message after 5 seconds
  setTimeout(() => {
    formMessage.textContent = '';
    formMessage.classList.remove('success', 'error');
  }, 5000);
}
</script>
