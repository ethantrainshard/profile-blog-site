<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | strip_html }}">
  <meta name="author" content="{{ site.name }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header>
    <nav class="linkedin-header">
      <div class="linkedin-header-left">
        <a href="/" class="linkedin-logo">{{ site.name }}</a>
        <a href="/blog" class="linkedin-header-link">My Blog</a>
      </div>
      <div class="linkedin-header-right">
        <a href="/" class="linkedin-header-link">Home</a>
        <a href="/about" class="linkedin-header-link">About</a>
        <a href="/projects" class="linkedin-header-link">Projects</a>
        <a href="/blog" class="linkedin-header-link">Blog</a>
        <a href="/contact" class="linkedin-header-link">Contact</a>
      </div>
    </nav>
  </header>

  <main class="post-main">
    <div class="post-container">
      <a href="/blog" class="back-to-blog">← Back to Blog</a>
      <article class="post-article">
        <header class="post-article-header">
          <h1>{{ page.title }}</h1>
          <div class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %d, %Y' }}</time>
            {% if page.tags %}
            <span class="post-tags">
              {% for tag in page.tags %}
                <span class="tag">{{ tag }}</span>
              {% endfor %}
            </span>
            {% endif %}
          </div>
        </header>
        <div class="post-content">
          {{ content }}
        </div>
      </article>
    </div>
  </main>

  <script src="/js/profile-tabs.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
