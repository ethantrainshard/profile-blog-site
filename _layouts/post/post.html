<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | strip_html }}">
  <meta name="author" content="{{ site.name }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>

  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/images/favicon.ico">
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css">
</head>
<body>
  <header>
    <nav class="linkedin-header">
      <div class="linkedin-header-left">
        <a href="{{ site.baseurl }}/" class="linkedin-logo">{{ site.name }}</a>
      </div>
      <div class="linkedin-header-right">
        <a href="{{ site.baseurl }}/" class="linkedin-header-link">Home</a>
        <a href="{{ site.baseurl }}/about" class="linkedin-header-link">About</a>
        <a href="{{ site.baseurl }}/projects" class="linkedin-header-link">Projects</a>
        <a href="{{ site.baseurl }}/blog" class="linkedin-header-link">Blog</a>
        <a href="{{ site.baseurl }}/contact" class="linkedin-header-link">Contact</a>
      </div>
    </nav>
  </header>

  <main class="post-page">
    <article class="post-container">
      <a href="{{ site.baseurl }}/blog" class="back-to-blog">← Back to Blogs</a>
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %d, %Y' }}</time>
        {% if page.tags %}
        <div class="post-tags">
          {% for tag in page.tags %}
            <a href="{{ site.baseurl }}/blog#{{ tag }}" class="tag" data-tag="{{ tag }}">{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </div>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <script src="{{ site.baseurl }}/js/main.js"></script>
</body>
</html>
